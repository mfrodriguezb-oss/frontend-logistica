<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>LogiTrans Express</h1>
            <p class="subtitle">Sistema de Control de Rutas y Transporte</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario o Correo:</label>
                    <input type="text" id="usuario" name="usuario" required placeholder="Ingrese usuario o correo">
                </div>
                
                <div class="form-group">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" name="contrasena" required placeholder="Ingrese contraseña">
                </div>
                
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            
            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
