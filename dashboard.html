<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <h2>LogiTrans</h2>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active">Inicio</a></li>
                <li><a href="conductores.html">Conductores</a></li>
                <li><a href="vehiculos.html">Vehiculos</a></li>
                <li><a href="rutas.html">Rutas</a></li>
                <li><a href="viajes.html">Viajes</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1>Panel de Control</h1>
                <div class="user-info">
                    <span id="nombreUsuario">Usuario</span>
                    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesion</button>
                </div>
            </header>

            <div class="content">
                <h2>🚛 Bienvenido a LogiTrans Express</h2>
                <p>Sistema de Control de Rutas y Transporte de Carga</p>
                
                <div class="tarjetas-grid">
                    <div class="tarjeta tarjeta-conductores">
                        <h3>👷</h3>
                        <p>Conductores</p>
                        <a href="conductores.html">Gestionar →</a>
                    </div>
                    
                    <div class="tarjeta tarjeta-vehiculos">
                        <h3>🚐</h3>
                        <p>Vehiculos</p>
                        <a href="vehiculos.html">Gestionar →</a>
                    </div>
                    
                    <div class="tarjeta tarjeta-rutas">
                        <h3>🗺️</h3>
                        <p>Rutas</p>
                        <a href="rutas.html">Gestionar →</a>
                    </div>
                    
                    <div class="tarjeta tarjeta-viajes">
                        <h3>📋</h3>
                        <p>Viajes</p>
                        <a href="viajes.html">Gestionar →</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
