<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 🗂️ Sidebar / Menú -->
        <nav class="sidebar">
            <h2>LogiTrans</h2>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active">Inicio</a></li>
                <li><a href="conductores.html">Conductores</a></li>
                <li><a href="vehiculos.html">Vehiculos</a></li>
                <li><a href="rutas.html">Rutas</a></li>
                <li><a href="viajes.html">Viajes</a></li>
            </ul>
        </nav>

        <!-- 📋 Contenido Principal -->
        <main class="main-content">
            <header class="header">
                <h1>Panel de Control</h1>
                <div class="user-info">
                    <span id="nombreUsuario">Usuario</span>
                    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesion</button>
                </div>
            </header>

            <div class="content">
                <h2>🚛 Bienvenido a LogiTrans Express</h2>
                <p>Sistema de Control de Rutas y Transporte de Carga</p>
                
                <div style="margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div style="background: #e8f5e9; padding: 20px; border-radius: 16px; text-align: center;">
                        <h3 style="color: #6b9080; font-size: 36px; margin-bottom: 10px;">👷</h3>
                        <p style="font-weight: 600; color: #4a5568;">Conductores</p>
                        <a href="conductores.html" style="color: #6b9080; text-decoration: none; font-size: 13px;">Gestionar →</a>
                    </div>
                    
                    <div style="background: #e3f2fd; padding: 20px; border-radius: 16px; text-align: center;">
                        <h3 style="color: #0277bd; font-size: 36px; margin-bottom: 10px;">🚐</h3>
                        <p style="font-weight: 600; color: #4a5568;">Vehiculos</p>
                        <a href="vehiculos.html" style="color: #0277bd; text-decoration: none; font-size: 13px;">Gestionar →</a>
                    </div>
                    
                    <div style="background: #fff3e0; padding: 20px; border-radius: 16px; text-align: center;">
                        <h3 style="color: #ef6c00; font-size: 36px; margin-bottom: 10px;">🗺️</h3>
                        <p style="font-weight: 600; color: #4a5568;">Rutas</p>
                        <a href="rutas.html" style="color: #ef6c00; text-decoration: none; font-size: 13px;">Gestionar →</a>
                    </div>
                    
                    <div style="background: #f3e5f5; padding: 20px; border-radius: 16px; text-align: center;">
                        <h3 style="color: #7b1fa2; font-size: 36px; margin-bottom: 10px;">📋</h3>
                        <p style="font-weight: 600; color: #4a5568;">Viajes</p>
                        <a href="viajes.html" style="color: #7b1fa2; text-decoration: none; font-size: 13px;">Gestionar →</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
