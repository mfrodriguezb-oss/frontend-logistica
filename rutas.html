<!DOCTYPE html>
<html lang="es">
<head>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Rutas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <h2>LogiTrans</h2>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Inicio</a></li>
                <li><a href="conductores.html">Conductores</a></li>
                <li><a href="vehiculos.html">Vehiculos</a></li>
                <li><a href="rutas.html" class="active">Rutas</a></li>
                <li><a href="viajes.html">Viajes</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1>🗺️ Rutas</h1>
                <div class="user-info">
                    <span id="nombreUsuario">Usuario</span>
                    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesion</button>
                </div>
            </header>

            <div class="content">
                <div class="flex-between">
                    <h2>Lista de Rutas</h2>
                    <button class="btn btn-success" onclick="mostrarFormularioCrear()">+ Nueva Ruta</button>
                </div>

                <!-- Panel de Busqueda -->
                <div class="search-panel">
                    <div class="search-grid">
                        <div class="search-group">
                            <label for="filtroOrigen">Ciudad Origen:</label>
                            <input type="text" id="filtroOrigen" placeholder="Filtrar por origen...">
                        </div>
                        <div class="search-group">
                            <label for="filtroDestino">Ciudad Destino:</label>
                            <input type="text" id="filtroDestino" placeholder="Filtrar por destino...">
                        </div>
                    </div>
                    <div class="search-buttons">
                        <button class="btn btn-info" onclick="buscarRutas()">Buscar</button>
                        <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="tablaRutas">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ciudad Origen</th>
                                <th>Ciudad Destino</th>
                                <th>Distancia (km)</th>
                                <th>Tiempo Estimado</th>
                                <th>Observaciones</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <tr>
                                <td colspan="7" class="texto-cargando">Cargando rutas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para Crear/Editar Ruta -->
    <div id="modalRuta" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitulo">Nueva Ruta</h2>
            <form id="formRuta">
                <input type="hidden" id="rutaId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ciudad_origen">Ciudad Origen:</label>
                        <input type="text" id="ciudad_origen" required placeholder="Ej: Bogota">
                    </div>
                    <div class="form-group">
                        <label for="ciudad_destino">Ciudad Destino:</label>
                        <input type="text" id="ciudad_destino" required placeholder="Ej: Medellin">
                    </div>
                    <div class="form-group">
                        <label for="distancia">Distancia (km):</label>
                        <input type="number" id="distancia" required placeholder="Ej: 450" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="tiempo_estimado">Tiempo Estimado (horas):</label>
                        <input type="number" id="tiempo_estimado" required placeholder="Ej: 8" step="0.5">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="observaciones">Observaciones:</label>
                        <textarea id="observaciones" placeholder="Ingrese observaciones"></textarea>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-danger" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/rutas.js"></script>
</body>
</html>
