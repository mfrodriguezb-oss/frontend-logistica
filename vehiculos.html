<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Vehiculos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <h2>LogiTrans</h2>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Inicio</a></li>
                <li><a href="conductores.html">Conductores</a></li>
                <li><a href="vehiculos.html" class="active">Vehiculos</a></li>
                <li><a href="rutas.html">Rutas</a></li>
                <li><a href="viajes.html">Viajes</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1>🚐 Vehiculos</h1>
                <div class="user-info">
                    <span id="nombreUsuario">Usuario</span>
                    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesion</button>
                </div>
            </header>

            <div class="content">
                <div class="flex-between">
                    <h2>Lista de Vehiculos</h2>
                    <button class="btn btn-success" onclick="mostrarFormularioCrear()">+ Nuevo Vehiculo</button>
                </div>

                <div class="table-container">
                    <table id="tablaVehiculos">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Placa</th>
                                <th>Tipo</th>
                                <th>Capacidad (kg)</th>
                                <th>Modelo</th>
                                <th>Marca</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <tr>
                                <td colspan="8" class="texto-cargando">Cargando vehiculos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/vehiculos.js"></script>
</body>
</html>
